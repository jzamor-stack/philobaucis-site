<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendre RDV - Philobaucis</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/fyMwzvYV/philobaucis-logo-(9).png">
    <style>
        :root {
            --primary-red: #c41919;
            --primary-purple: #6b1e5f;
            --gradient: linear-gradient(135deg, #c41919 0%, #6b1e5f 100%);
        }
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; padding: 15px;
        }
        .container {
            width: 100%; max-width: 1100px; background: white;
            border-radius: 24px; display: flex; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
            height: 700px; /* Fixé pour éviter le double scroll */
        }
        .info-panel {
            flex: 0.8; background: var(--gradient); padding: 40px; color: white;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .logo { width: 70px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); margin-bottom: 20px; }
        
        .booking-panel { 
            flex: 1.5; background: white; position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        h1 { font-size: 1.8rem; margin: 10px 0; font-weight: 800; line-height: 1.2; }
        p { font-size: 1rem; opacity: 0.9; line-height: 1.5; }
        
        .badge-info {
            background: rgba(255,255,255,0.12); padding: 15px; border-radius: 12px; 
            font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 850px) { 
            .container { flex-direction: column; height: auto; min-height: 100vh; }
            .info-panel { flex: none; }
            .booking-panel { height: 700px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="info-panel">
        <div>
            <img src="https://i.postimg.cc/gkz1wGGw/philobaucis-logo-(9).png" class="logo">
            <p style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; font-weight: bold; opacity: 0.8; margin-bottom: 5px;">Jean-Daniel Zamor</p>
            <h1>S'engager avec Philobaucis</h1>
            <p>Vous souhaitez plus d'informations ? N'hésitez pas à prendre rendez-vous avec Jean-Daniel ZAMOR, Président du projet.</p>
        </div>
        
        <div class="badge-info">
            🕒 30 min | 🎥 Visioconférence Google Meet
            <br><br>
            <span style="font-size: 0.8rem; opacity: 0.7;">Confirmation immédiate par e-mail après réservation.</span>
        </div>
    </div>

    <div class="booking-panel">
        <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ0XGHcPQyeeXp08giFPsgSBp2d8x2bHpmRU6hDxhmnq_6tIgH1exesLWAMlTU6rxG0Nr-KC7X3-?gv=true"></iframe>
    </div>
</div>

</body>
</html>
