<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendre RDV - Philobaucis</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/fyMwzvYV/philobaucis-logo-(9).png">
    <style>
        :root {
            --primary-red: #c41919;
            --primary-purple: #6b1e5f;
            --bg-dark: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Fond dégradé sombre et élégant */
            background: radial-gradient(circle at top right, #2c3e50, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        /* Effet de verre (Glassmorphism) */
        .container {
            width: 100%;
            max-width: 1150px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(15px); /* Flou d'arrière-plan */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            height: 750px;
        }

        /* Panneau gauche avec un dégradé plus profond */
        .info-panel {
            flex: 0.7;
            background: linear-gradient(180deg, rgba(196, 25, 25, 0.8) 0%, rgba(107, 30, 95, 0.8) 100%);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--glass-border);
        }

        .logo { 
            width: 80px; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 2.2rem; 
            margin: 15px 0; 
            font-weight: 800; 
            line-height: 1.1;
            background: linear-gradient(to right, #ffffff, #cccccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            font-size: 1.1rem; 
            opacity: 0.8; 
            line-height: 1.6;
            font-weight: 300;
        }

        .badge-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 16px; 
            font-size: 0.95rem;
            border: 1px solid var(--glass-border);
            line-height: 1.6;
        }

        /* Panneau droit pour le calendrier */
        .booking-panel { 
            flex: 1.4;
            background: rgba(255, 255, 255, 0.95); /* On garde un fond clair pour le calendrier Google pour la lisibilité */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive */
        @media (max-width: 900px) { 
            .container { 
                flex-direction: column; 
                height: auto; 
                min-height: 90vh;
                margin-top: 20px;
            }
            .info-panel { flex: none; padding: 30px; }
            .booking-panel { height: 700px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="info-panel">
        <div>
            <img src="https://i.postimg.cc/gkz1wGGw/philobaucis-logo-(9).png" class="logo">
            <p style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 3px; font-weight: 700; color: #ffbcbc; margin-bottom: 10px;">Jean-Daniel Zamor</p>
            <h1>S'engager avec Philobaucis</h1>
            <p>Vous souhaitez plus d'informations ? <br>Prenons un moment pour échanger sur votre projet et vos besoins.</p>
        </div>
        
        <div class="badge-info">
            <span style="color: #ffbcbc; font-weight: bold;">🕒 Session de 30 min</span><br>
            🎥 Visioconférence Google Meet<br><br>
            <span style="font-size: 0.8rem; opacity: 0.6;">L'invitation et le lien de connexion vous seront envoyés par e-mail.</span>
        </div>
    </div>

    <div class="booking-panel">
        <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ0XGHcPQyeeXp08giFPsgSBp2d8x2bHpmRU6hDxhmnq_6tIgH1exesLWAMlTU6rxG0Nr-KC7X3-?gv=true"></iframe>
    </div>
</div>

</body>
</html>
