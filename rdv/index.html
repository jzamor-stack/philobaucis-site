<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendre RDV - Philobaucis</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/fyMwzvYV/philobaucis-logo-(9).png">
    <style>
        :root {
            --primary-red: #c41919;
            --primary-purple: #6b1e5f;
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
            height: 780px;
        }

        .info-panel {
            flex: 0.65;
            background: linear-gradient(160deg, rgba(196, 25, 25, 0.85) 0%, rgba(107, 30, 95, 0.9) 100%);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo { 
            width: 80px; 
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 2.4rem; 
            font-weight: 800; 
            line-height: 1.1;
            margin: 20px 0;
            letter-spacing: -1px;
        }

        .badge-info {
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.95rem;
        }

        /* L'astuce pour la partie Google */
        .booking-panel { 
            flex: 1.35;
            background: #ffffff; /* Fond blanc pur pour garder la lisibilité Google */
            position: relative;
            margin: 15px; /* Petit espace pour créer un cadre */
            border-radius: 20px; /* Arrondi du calendrier lui-même */
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* On peut appliquer un très léger filtre pour adoucir le blanc */
            filter: contrast(95%) brightness(98%); 
        }

        @media (max-width: 950px) { 
            .container { flex-direction: column; height: auto; border-radius: 20px; }
            .info-panel { padding: 40px 30px; }
            .booking-panel { height: 650px; margin: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="info-panel">
        <div>
            <img src="https://i.postimg.cc/gkz1wGGw/philobaucis-logo-(9).png" class="logo">
            <p style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 4px; font-weight: 700; color: #ffcccc; margin-bottom: 10px;">Jean-Daniel Zamor</p>
            <h1>S'engager avec Philobaucis</h1>
            <p style="font-size: 1.15rem; opacity: 0.9; font-weight: 300;">Discutons ensemble de votre rôle dans le futur de Philobaucis. Sélectionnez le créneau qui vous convient.</p>
        </div>
        
        <div class="badge-info">
            <div style="display: flex; align-items: center; margin-bottom: 10px;">
                <span style="font-size: 1.2rem; margin-right: 10px;">🕒</span>
                <span>Session stratégique de <strong>30 minutes</strong></span>
            </div>
            <div style="display: flex; align-items: center; opacity: 0.8;">
                <span style="font-size: 1.2rem; margin-right: 10px;">🎥</span>
                <span>Lien Google Meet envoyé par e-mail</span>
            </div>
        </div>
    </div>

    <div class="booking-panel">
        <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ0XGHcPQyeeXp08giFPsgSBp2d8x2bHpmRU6hDxhmnq_6tIgH1exesLWAMlTU6rxG0Nr-KC7X3-?gv=true"></iframe>
    </div>
</div>

</body>
</html>
