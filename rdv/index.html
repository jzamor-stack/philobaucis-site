<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendre RDV - Philobaucis</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/fyMwzvYV/philobaucis-logo-(9).png">
    <style>
        :root {
            --primary-red: #c41919;
            --primary-purple: #6b1e5f;
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
            height: 750px;
        }

        .info-panel {
            flex: 0.7;
            background: linear-gradient(160deg, rgba(196, 25, 25, 0.85) 0%, rgba(107, 30, 95, 0.9) 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo { 
            width: 70px; 
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 2.2rem; 
            font-weight: 800; 
            line-height: 1.1;
            margin: 15px 0;
            letter-spacing: -1px;
        }

        .badge-info {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }

        .booking-panel { 
            flex: 1.3;
            background: #ffffff;
            position: relative;
            margin: 15px;
            border-radius: 20px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: contrast(96%) brightness(98%); 
        }

        /* RESPONSIVE OPTIMISÉ */
        @media (max-width: 900px) { 
            body { padding: 10px; }
            .container { 
                flex-direction: column; 
                height: auto; 
                min-height: 95vh;
                border-radius: 20px;
            }
            .info-panel { 
                padding: 30px 25px; 
                flex: none;
            }
            .info-panel h1 { font-size: 1.6rem; }
            .info-panel p { font-size: 1rem; }
            .logo { width: 50px; }
            .booking-panel { 
                height: 600px; 
                margin: 10px;
                flex: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="info-panel">
        <div>
            <img src="https://i.postimg.cc/gkz1wGGw/philobaucis-logo-(9).png" class="logo">
            <p style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 3px; font-weight: 700; color: #ffcccc; margin-bottom: 5px;">Jean-Daniel Zamor</p>
            <h1>S'engager avec Philobaucis</h1>
            <p style="opacity: 0.9; font-weight: 300;">Discutons de votre rôle dans le futur de Philobaucis. Choisissez un créneau pour un échange stratégique.</p>
        </div>
        
        <div class="badge-info">
            <div style="display: flex; align-items: center; margin-bottom: 8px;">
                <span style="font-size: 1.1rem; margin-right: 10px;">🕒</span>
                <span>Session de <strong>60 minutes</strong></span>
            </div>
            <div style="display: flex; align-items: center; opacity: 0.85;">
                <span style="font-size: 1.1rem; margin-right: 10px;">🎥</span>
                <span>Visioconférence Google Meet</span>
            </div>
        </div>
    </div>

    <div class="booking-panel">
        <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ0XGHcPQyeeXp08giFPsgSBp2d8x2bHpmRU6hDxhmnq_6tIgH1exesLWAMlTU6rxG0Nr-KC7X3-?gv=true"></iframe>
    </div>
</div>

</body>
</html>
