<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Philobaucis</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #0a0a0c;
      --card: #141418;
      --text: #ffffff;
      --muted: #a1a1aa;
      --primary: #c41919;
      --border: rgba(255,255,255,0.1);
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      margin: 0; padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
    
    /* LOGIN SCREEN */
    #login-screen {
      height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); text-align: center; width: 300px;
    }
    input { width: 100%; padding: 12px; margin: 15px 0; background: var(--dark); border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box;}
    button { background: linear-gradient(135deg, #c41919, #6b1e5f); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
    
    /* DASHBOARD */
    #dashboard { display: none; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); border-left: 4px solid var(--primary); }
    .stat-value { font-size: 2.5rem; font-weight: 800; margin: 10px 0 0 0; }
    
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 16px; overflow: hidden; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: rgba(255,255,255,0.05); color: var(--muted); font-weight: 600; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .status-pending { background: rgba(255, 165, 0, 0.2); color: #FFA500; }
    .status-signed { background: rgba(72, 187, 120, 0.2); color: #48bb78; }
    
    .action-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 6px 12px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; }
    .action-btn:hover { background: var(--primary); color: white; }
  </style>
</head>
<body>

  <div class="container">
    <div id="login-screen">
      <div class="login-box">
        <h2>Accès Sécurisé</h2>
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="login()">Se Connecter</button>
        <p id="login-error" style="color: #ff4444; display: none; font-size: 0.9rem; margin-top: 10px;">Mot de passe incorrect</p>
      </div>
    </div>

    <div id="dashboard">
      <div class="header">
        <h2>Administration Philobaucis</h2>
        <button style="width: auto; background: transparent; border: 1px solid var(--border);" onclick="logout()">Déconnexion</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div style="color: var(--muted);">Maraudes Réservées (Signées)</div>
          <div class="stat-value" id="total-signed">0</div>
        </div>
        <div class="stat-card" style="border-left-color: #FFA500;">
          <div style="color: var(--muted);">Demandes en attente</div>
          <div class="stat-value" id="total-pending">0</div>
        </div>
      </div>

      <h3>Dernières Demandes & Contrats</h3>
      <table>
        <thead>
          <tr>
            <th>Entreprise</th>
            <th>Contact</th>
            <th>Type</th>
            <th>Détails</th>
            <th>Statut</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="6" style="text-align:center; color: var(--muted);">Chargement des données... (En attente de connexion base de données)</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let authToken = '';

    // On simule une connexion (on rajoutera la vraie quand tu auras ta base de données)
    async function login() {
      const pwd = document.getElementById('password').value;
      if(pwd === "Zamor2026") { // Mot de passe provisoire en attendant le backend complet
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    function logout() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('password').value = '';
    }
  </script>
</body>
</html>
